<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速環形賽車 - 網頁版</title>
    <style>
        body {
            background-color: #111a24;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
            font-size: 28px;
        }
        #info {
            font-size: 22px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #score {
            color: #2ecc71;
            font-weight: bold;
        }
        canvas {
            border: 6px solid #34495e;
            background-color: #1e272e;
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(52, 152, 219, 0.3);
        }
        #msg {
            display: none;
            color: #ff4757;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .controls-tip {
            margin-top: 10px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>極速環形賽車</h1>
    <div id="info">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div id="msg">💥 遊戲結束！<br><span style="font-size: 18px; color: #fff;">按「空白鍵」重新挑戰</span></div>
    <div class="controls-tip">操作方式：鍵盤 ← 左鍵 / → 右鍵 控制方向</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const msgElement = document.getElementById("msg");

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const trackRadius = 180; 

        let carAngle = 0; 
        const carSpeed = 0.06; // 稍微提升了操控流暢度
        const carSize = 24; 

        let keys = { ArrowLeft: false, ArrowRight: false };
        let obstacles = [];
        let obstacleSpawnTimer = 0;
        let score = 0;
        let gameRunning = true;
        let animationId;

        window.addEventListener("keydown", (e) => {
            if (e.key in keys) keys[e.key] = true;
            if (e.key === " " && !gameRunning) resetGame();
        });
        window.addEventListener("keyup", (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        function spawnObstacle() {
            const angle = Math.random() * Math.PI * 2;
            obstacles.push({
                angle: angle,
                timer: 150 // 縮短預警時間，讓節奏更緊湊
            });
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 繪製賽道
            drawTrack();

            // 2. 更新與繪製賽車
            if (keys.ArrowLeft) carAngle -= carSpeed;
            if (keys.ArrowRight) carAngle += carSpeed;

            const carX = centerX + Math.cos(carAngle) * trackRadius;
            const carY = centerY + Math.sin(carAngle) * trackRadius;
            drawCar(carX, carY, carAngle);

            // 3. 處理障礙物邏輯
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer > 35) { 
                spawnObstacle();
                obstacleSpawnTimer = 0;
                score += 10; 
                scoreElement.innerText = score;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                const obsX = centerX + Math.cos(obs.angle) * trackRadius;
                const obsY = centerY + Math.sin(obs.angle) * trackRadius;

                drawObstacle(obsX, obsY, obs.timer);

                // 當計時低於 30 幀（路障實體化），開啟碰撞偵測
                if (obs.timer < 30) { 
                    const dist = Math.hypot(carX - obsX, carY - obsY);
                    if (dist < carSize - 2) {
                        gameOver();
                    }
                }

                obs.timer--;
                if (obs.timer <= 0) {
                    obstacles.splice(i, 1);
                }
            }

            animationId = requestAnimationFrame(update);
        }

        function drawTrack() {
            // 灰色柏油路面
            ctx.beginPath();
            ctx.arc(centerX, centerY, trackRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "#3d4e5d";
            ctx.lineWidth = 44; 
            ctx.stroke();

            // 賽道中心黃色虛線
            ctx.beginPath();
            ctx.arc(centerX, centerY, trackRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "#f1c40f";
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 15]);
            ctx.stroke();
            ctx.setLineDash([]); 
        }

        function drawCar(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle + Math.PI / 2); 

            // 畫一個帥氣的三角形賽車
            ctx.beginPath();
            ctx.moveTo(0, -carSize/2); // 車頭
            ctx.lineTo(-carSize/2, carSize/2); // 左後輪
            ctx.lineTo(carSize/2, carSize/2); // 右後輪
            ctx.closePath();
            
            ctx.fillStyle = "#3498db"; // 藍色車身
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#3498db";
            ctx.fill();

            // 車尾噴火特效
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(-4, carSize/2, 8, 5);

            ctx.restore();
        }

        function drawObstacle(x, y, timer) {
            ctx.save();
            if (timer > 30) {
                // 預警狀態：慢慢變大且閃爍的能量圈
                const alpha = (150 - timer) / 120;
                ctx.strokeStyle = `rgba(231, 76, 60, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x, y, 15 + Math.sin(timer/5)*3, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // 實體狀態：紅色危險路障
                ctx.fillStyle = "#e74c3c";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#e74c3c";
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            msgElement.style.display = "block";
        }

        function resetGame() {
            carAngle = 0;
            obstacles = [];
            obstacleSpawnTimer = 0;
            score = 0;
            scoreElement.innerText = score;
            msgElement.style.display = "none";
            gameRunning = true;
            update();
        }

        // 啟動遊戲
        update();
    </script>
</body>
</html>
