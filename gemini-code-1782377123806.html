<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪吃蛇</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #game-over-msg {
            display: none;
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>經典貪吃蛇</h1>
    <div id="score-board">分數: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="game-over-msg">遊戲結束！按「空白鍵」重新開始</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverMsg = document.getElementById("game-over-msg");

        // 格子大小與數量
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 蛇的初始狀態
        let snake = [{x: 10, y: 10}];
        let dx = 1; // 水平移動方向 (1: 右, -1: 左)
        let dy = 0; // 垂直移動方向 (1: 下, -1: 上)

        // 食物位置
        let food = {x: 5, y: 5};

        // 遊戲變數
        let score = 0;
        let gameInterval;
        let gameRunning = true;
        let changingDirection = false; // 防止連續按鍵造成的自殺 Bug

        // 啟動遊戲
        resetGame();

        // 遊戲主迴圈
        function main() {
            if (hasGameEnded()) {
                gameOverMsg.style.display = "block";
                gameRunning = false;
                clearInterval(gameInterval);
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        // 清空畫布
        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 畫蛇
        function drawSnake() {
            snake.forEach((part, index) => {
                // 蛇頭用亮綠色，蛇身用深綠色
                ctx.fillStyle = index === 0 ? "#2ed573" : "#26af5f";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // 移動蛇
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // 檢查是否吃到食物
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // 沒吃到食物就移除尾巴
            }
        }

        // 隨機生成食物
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // 確保食物不會生在蛇的身上
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // 畫食物
        function drawFood() {
            ctx.fillStyle = "#ff4757"; // 紅色食物
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function hasGameEnded() {
            //
